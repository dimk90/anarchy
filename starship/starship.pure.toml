'$schema' = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# Timeout for starship to scan files (in milliseconds).
scan_timeout = 100 # default 30

# Timeout for commands executed by starship (in milliseconds).
command_timeout = 1000 # default 500


## Prompt


format = """
$username\
$hostname\
$directory\
$package\
$nodejs\
$python\
$git_branch\
$git_commit\
$git_state\
$git_status\
$fill\
$status\
$cmd_duration\
$jobs\
$container\
$memory_usage\
$shlvl\
$battery\
$line_break\
$character"""


## Color theme


palette = 'pure'

[palettes.pure]
black = '#000000'
bright-black = '#606060'
red = '#F95D5B'
orange = '208'
green = '#62F592'
blue = '#5DC8FD'
yellow = '#F3F8A2'
purple = '#DB61AA'
magenta = '#DB61AA'
cyan = '#94DEEE'
white = '#F1F1F0'


## Modules - Left


[os]
format = '[$symbol]($style) '
style = 'white'
disabled = false

[os.symbols]
Alpine = '’īĆ'
Arch = '’īā'
CachyOS = '’īā'
CentOS = '’īä'
Debian = '’īå'
Fedora = '’īŖ'
Gentoo = '’īŹ'
Android = '’ģ╗'
Ios = '¾░ĆĘ'
Linux = '’īÜ'
Macos = '’īé'
FreeBSD = '’īī'
NetBSD = '’Ćż'
OpenBSD = '¾░ł║'
NixOS = '’īō'
Pop = '’ī¬'
Raspbian = '’īĢ'
Redhat = '’ī¢'
RedHatEnterprise = '’ī¢'
openSUSE = '’īö'
SUSE = '’īö'
Ubuntu = '’īø'
Unknown = '’łŁ'
Windows = '¾░Ź▓'


[username]
format ='[$user]($style) '
style_user = 'yellow bold'
style_root = 'red bold'
show_always = false


[hostname]
ssh_only = true
ssh_symbol = '¾░ó╣ '
style = 'white dimmed bold'
format = '[$ssh_symbol](white) [$hostname]($style) '


[directory]
format = '[$path]($style)[$read_only]($read_only_style) '
truncate_to_repo = false
read_only = ' ¾░īŠ'
style = 'blue bold'
truncation_length = 5
truncation_symbol = ''
use_os_path_sep = false # always use /


[package]
symbol = '¾░ÅŚ '
style = 'orange'
format = '[$symbol$version]($style) '


[nodejs]
format = '[$symbol($version)]($style) '
symbol = '¾░ÄÖ '
style = 'green'
disabled = false


[python]
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = 'ŅłĄ '
style = 'green'
version_format = 'v${major}.${minor}'
python_binary = [['uv', 'run', '--no-python-downloads', '--no-project', 'python'], ['python']]


[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style)'
style = 'bright-black'

[git_commit]
format = '[$tag]($style)'
tag_symbol = ' ’ÉÆ '
tag_disabled = false
style = 'bright-black'

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = 'bright-black'

[git_status]
format = '[[(*$conflicted$untracked$modified$staged$renamed$deleted)](purple bold) ($ahead_behind$stashed)]($style)'
style = 'blue bold'
conflicted = 'ŌĆŗ'
untracked = 'ŌĆŗ'
modified = 'ŌĆŗ'
staged = 'ŌĆŗ'
renamed = 'ŌĆŗ'
deleted = 'ŌĆŗ'
stashed = 'ŌēĪ'


## Modules - Center


[fill]
symbol = ' '


## Modules - Right


[status]
format = '[ $symbol$status]($style)'
symbol = '’æ¦ '
disabled = false


[cmd_duration]
min_time = 2000
format = ' ¾▒Ä½ [$duration]($style)'
style = 'yellow bold'


[jobs]
format = '[ $symbol(:$number)]($style)'
symbol = '&'
number_threshold = 2


[container]
format = '[ ($symbol \\[$name\\])]($style)'
style = 'red dimmed'
symbol = '’ÆĘ '


[memory_usage]
format = '[( $symbol$ram)]($style)'
symbol = '¾░Źø '
threshold = 90
disabled = false


[shlvl]
disabled = false
format = '[ $symbol]($style)'
repeat = true
symbol = '’Æē '
style = 'white'
repeat_offset = 1


[battery]
full_symbol = '¾░ü╣'
empty_symbol = '¾░éÄ'
format = '[ $symbol ]($style)'

[[battery.display]]
