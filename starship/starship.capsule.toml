'$schema' = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# Timeout for starship to scan files (in milliseconds).
scan_timeout = 100 # default 30

# Timeout for commands executed by starship (in milliseconds).
command_timeout = 1000 # default 500


## Prompt


format = """
[â•­](fg:cap-separator)$os\
$directory\
$package\
$nodejs\
$python\
$git_branch\
$git_commit\
$git_status\
$fill\
$status\
$cmd_duration\
$jobs\
$container\
$shlvl\
$username\
$hostname\
$battery\
$line_break\
[â•°â”€](fg:cap-separator)$character"""


## Color theme


palette = 'capsule'

[palettes.capsule]
black = '#000000'
bright-black = '#606060'
red = '#F95D5B'
