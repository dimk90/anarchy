green = '#62F592'
blue = '#5DC8FD'
yellow = '#F1FA8C'
purple = '#DB61AA'
magenta = '#DB61AA'
cyan = '#94DEEE'
white = '#F1F1F0'

cap-icon       = '#202020'
cap-separator  = '#383838'
