

## Iosevka Term


[buildPlans.IosevkaTerm]
family = "Iosevka Term"
spacing = "term"
serifs = "sans"
noCvSs = true
exportGlyphNames = false

[buildPlans.IosevkaTerm.variants]
inherits = "ss08"

[buildPlans.IosevkaTerm.variants.design]
zero = "slashed-split"
l = "serifed-asymmetric"
percent = "rings-continuous-slash"
pilcrow = "low"

[buildPlans.IosevkaTerm.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.IosevkaTerm.weights.Medium]
shape = 500
menu = 500
css = 500

[buildPlans.IosevkaTerm.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.IosevkaTerm.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"

[buildPlans.IosevkaTerm.widths.Normal]
shape = 548
menu = 6
css = "normal"


