# === Theme ===

timeout: 10
default_entry: 1          # 1-indexed; points to the first /entry below (UKI)
remember_last_entry: yes  # if you booted a snapshot last, preselect it (UEFI only)
editor_enabled: no        # disable the 'e' edit-entry option in the menu
# quiet: yes              # suppress non-error output during chainload

interface_branding:       # empty value hides the "Limine X.Y.Z" header
term_font_scale: 2x2      # HiDPI panels

# base theme: https://github.com/catppuccin/limine/blob/main/themes/catppuccin-mocha.conf
backdrop: 000000          # color outside the terminal box (no wallpaper)
term_background: 000000   # terminal box bg — match backdrop = flat surface
term_foreground: cdd6f4   # default text color in the menu
term_background_bright: 585b70
term_foreground_bright: cdd6f4
term_palette: 000000;f38ba8;a6e3a1;f9e2af;89b4fa;f5c2e7;94e2d5;cdd6f4
term_palette_bright: 585b70;f38ba8;a6e3a1;f9e2af;89b4fa;f5c2e7;94e2d5;cdd6f4

# === Boot entries ===

/Arch Linux (UKI)
    protocol: efi
    path: boot():/efi/linux/arch-linux.efi

/UEFI Shell
    protocol: efi
    path: boot():/shellx64.efi

# === Snapshots ===> limine-snapper-sync below this line
