# === Theme ===

timeout: 4
default_entry: 1
remember_last_entry: yes
quiet: yes
hash_mismatch_panic: no

# UI chrome — strip the cruft
interface_branding:
interface_help_hidden: yes

# Backdrop & terminal box
backdrop: 0a0a0f
term_background: 0a0a0f
term_background_bright: 14141a
term_foreground: f1f1f0
term_foreground_bright: ffffff
term_margin: 64
term_font_scale: 2x2  # HiDPI panels

term_palette_bright: 606060;f95d5b;62f592;f3f8a2;5dc8fd;db61aa;94deee;ffffff
# Pure        black ;red   ; green; brown;blue  ;magenta;cyan ;white
term_palette: 0a0a0f;f95d5b;62f592;f3f8a2;5dc8fd;db61aa;94deee;f1f1f0
# Tokyo Night
# term_palette: 15161e;f7768e;9ece6a;e0af68;7aa2f7;bb9af7;7dcfff;a9b1d6

# === Boot entries ===

/Arch Linux (UKI)
    protocol: efi
    path: boot():/EFI/Linux/arch-linux.efi

/UEFI Shell
    protocol: efi
    path: boot():/shellx64.efi

