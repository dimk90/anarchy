
# === Settings ===

timeout: 86400            # ~infinite — wait for keypress; no option is buggy and load first entry
default_entry: 1          # 1-indexed; points to the first /entry below (UKI)
remember_last_entry: yes  # if you booted a snapshot last, preselect it (UEFI only)
editor_enabled: no        # disable the 'e' edit-entry option in the menu
# quiet: yes              # suppress non-error output during chainload

# === Boot entries ===

# Primary — UKI chainload (PE-signature trust under Secure Boot, painless TPM
# unseal). Firmware-default daily boot; carries no BLAKE2B hash to maintain.
/Arch Linux (UKI)
    protocol: efi
    path: boot():/EFI/Linux/arch-linux.efi

# Snapshot host — split kernel + initramfs that limine-snapper-sync clones into
# one entry per snapshot under //Snapshots. TARGET_OS_NAME in /etc/default/limine
# must point here ("Arch Linux"), not at the UKI entry above. //Current is the
# live-system split path; its kernel_cmdline must match /etc/kernel/cmdline
# verbatim (the cmdline baked into the UKI).
/Arch Linux
    //Current
    protocol: linux
    kernel_path: boot():/vmlinuz-linux
    module_path: boot():/intel-ucode.img
    module_path: boot():/initramfs-linux.img
    kernel_cmdline: rd.luks.name=[crypt-part-UUID]=cryptroot root=/dev/mapper/cryptroot rootflags=subvol=@ rw
    //Snapshots

/UEFI Shell
    protocol: efi
    path: boot():/EFI/shellx64.efi
