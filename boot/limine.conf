# === Theme ===

timeout: no               # infinite — never auto-boot, wait for keypress
default_entry: 1          # 1-indexed; points to the first /entry below (UKI)
remember_last_entry: yes  # if you booted a snapshot last, preselect it (UEFI only)
editor_enabled: no        # disable the 'e' edit-entry option in the menu
# quiet: yes              # suppress non-error output during chainload

# empty value hides the "Limine X.Y.Z" header
interface_branding:
# HiDPI panels
term_font_scale: 2x2

# Monochrome — black backdrop, gray body text, white highlights
backdrop: 000000               # color outside the terminal box (no wallpaper)
term_background: 000000        # terminal box bg — match backdrop = flat surface
term_foreground: a0a0a0        # default text color in the menu (gray)
term_background_bright: 333333 # selected-entry bar background (dim gray)
term_foreground_bright: ffffff # selected-entry / hotkey text (white)
term_palette: 000000;a0a0a0;a0a0a0;a0a0a0;a0a0a0;a0a0a0;a0a0a0;a0a0a0
term_palette_bright: 808080;ffffff;ffffff;ffffff;ffffff;ffffff;ffffff;ffffff

# === Boot entries ===

/Arch Linux (UKI)
    protocol: efi
    path: boot():/EFI/Linux/arch-linux.efi#<b2sum-of-uki>
    // Snapshots

/UEFI Shell
    protocol: efi
    path: boot():/EFI/shellx64.efi
