
[tool.marimo.keymap]
preset = "default"
destructive_delete = true

[tool.marimo.keymap.overrides]
"global.commandPalette" = "Ctrl-Shift-p"
"cell.delete" = "Shift-delete"
"cell.signatureHelp" = "Ctrl-q"
"global.toggleTerminal" = "Ctrl-`"

[tool.marimo.save]
format_on_save = false
autosave_delay = 6000
autosave = "after_delay"

[tool.marimo.display]
theme = "light"
default_table_page_size = 10
reference_highlighting = true
code_editor_font_size = 14
default_table_max_columns = 50
dataframes = "rich"
cell_output = "below"
default_width = "medium"
custom_css = [
    "style/cell.css",
    "style/font.css",
    "style/watermark.css"
]

[tool.marimo.runtime]
output_max_bytes = 8000000
watcher_on_save = "lazy"
auto_reload = "off"
on_cell_change = "autorun"
std_stream_max_bytes = 1000000
default_csv_encoding = "utf-8"

[tool.marimo.language_servers.pylsp]
enabled = true
enable_ruff = true
